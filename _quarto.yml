project:
  type: book
  output-dir: book

book:
  title: "Information Exploration"
  author: "Brian C. Keegan, Ph.D."
  date: "2026"
  repo-url: https://github.com/cuinfoscience/Information-Exploration-Book
  repo-actions: [edit]
  chapters:
    - index.qmd
    - part: "Foundations"
      chapters:
        - 01-setup.qmd
        - 02-documentation.qmd
        - 03-research-questions.qmd
        - 04-public-interest.qmd
    - part: "Python"
      chapters:
        - 05-py-loading.qmd
        - 06-py-cleaning.qmd
        - 07-py-extending.qmd
        - 08-py-reshaping.qmd
    - part: "SQL"
      chapters:
        - 09-sql-loading.qmd
        - 10-sql-cleaning.qmd
        - 11-sql-extending.qmd
        - 12-sql-reshaping.qmd
    - part: "Non-Tabular Data"
      chapters:
        - 13-spatial.qmd
        - 14-dyadic.qmd
        - 15-textual.qmd
        - 16-temporal.qmd
        - 17-structured.qmd
    - part: "Analysis"
      chapters:
        - 18-descriptive.qmd
        - 19-visualization.qmd
        - 20-hypothesis-testing.qmd
        - 21-linear-models.qmd
  appendices:
    - appendix-datasets.qmd
    - appendix-llm-methods.qmd
    - appendix-next-steps.qmd

format:
  html:
    theme: cosmo
    code-fold: false
    code-tools: true
    toc: true
    number-sections: true
    highlight-style: github

execute:
  eval: false
  echo: true
  warning: false
