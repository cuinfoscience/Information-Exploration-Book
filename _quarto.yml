project:
  type: book
  output-dir: book

book:
  title: "Information Exploration"
  author: "Brian C. Keegan, Ph.D."
  date: "2026"
  repo-url: https://github.com/cuinfoscience/Information-Exploration-Book
  repo-actions: [edit]
  llms-txt: true
  chapters:
    - index.qmd
    - part: "Foundations"
      chapters:
        - 01-terminal.qmd
        - 02-projects.qmd
        - 03-documentation.qmd
        - 04-environments.qmd
        - 05-errors.qmd
        - 06-research-questions.qmd
        - 07-public-interest.qmd
    - part: "Python"
      chapters:
        - 08-py-loading.qmd
        - 09-py-cleaning.qmd
        - 10-py-extending.qmd
        - 11-py-reshaping.qmd
    - part: "SQL"
      chapters:
        - 12-sql-loading.qmd
        - 13-sql-cleaning.qmd
        - 14-sql-extending.qmd
        - 15-sql-reshaping.qmd
    - part: "Analysis"
      chapters:
        - 16-descriptive.qmd
        - 17-visualization.qmd
        - 18-hypothesis-testing.qmd
  appendices:
    - appendix-datasets.qmd
    - appendix-llm-methods.qmd

format:
  html:
    theme: cosmo
    code-fold: false
    code-tools: true
    toc: true
    number-sections: true
    highlight-style: github

execute:
  eval: false
  echo: true
  warning: false
